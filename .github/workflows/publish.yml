name: Publish Pending Articles

on:
  push:
    branches: [main]
    paths:
      - 'content/articles/pending/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r scripts/requirements.txt

      - name: Publish to website
        run: python scripts/publishers/website.py

      - name: Commit published articles
        run: |
          git config user.name "ViaFinance Bot"
          git config user.email "bot@finance.vias.cn"
          git add content/ config/ -A
          git diff --staged --quiet || git commit -m "chore: publish pending articles [skip ci]"
          git push
